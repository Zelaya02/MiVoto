services:
  - type: web
    name: mivoto
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mivoto-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        value: OSVALDOZELAYA79@GMAIL.COM
      - key: MAIL_PASSWORD
        value: Zelaya1103@
      - key: MAIL_FROM
        value: OSVALDOZELAYA79@GMAIL.COM
databases:
  - name: mivoto-db
    plan: free
