services:
  - type: web
    name: mivoto
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mivoto-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
databases:
  - name: mivoto-db
    plan: free
