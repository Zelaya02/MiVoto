{% extends "base.html" %}
{% block title %}Votar - {{ mocion.titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-warning bg-opacity-10 text-warning border-0 pt-4">
                <h4 class="mb-0 fw-bold"><i class="fa-solid fa-check-to-slot me-2"></i>Emitir Voto</h4>
                <p class="mb-0 mt-2 text-dark">{{ mocion.titulo }}</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted">Cédula del Socio Votante</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-id-card"></i></span>
                            <input type="text" name="cedula" class="form-control form-control-lg" required placeholder="Ej: 1234567">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted">Opción de Voto</label>
                        <div class="d-grid gap-2">
                            {% for opcion in mocion.opciones %}
                            <input type="radio" class="btn-check" name="opcion" id="opcion_{{ opcion.id }}" value="{{ opcion.id }}" autocomplete="off" required>
                            <label class="btn btn-outline-primary btn-lg text-start px-4" for="opcion_{{ opcion.id }}">
                                <i class="fa-regular fa-circle text-muted me-2 radio-icon"></i>{{ opcion.texto }}
                            </label>
                            {% else %}
                            <!-- Opciones por defecto si_no -->
                            <input type="radio" class="btn-check" name="opcion" id="opcion_si" value="si" autocomplete="off" required>
                            <label class="btn btn-outline-success btn-lg text-start px-4" for="opcion_si">
                                <i class="fa-regular fa-circle text-muted me-2 radio-icon"></i>A Favor (Sí)
                            </label>
                            
                            <input type="radio" class="btn-check" name="opcion" id="opcion_no" value="no" autocomplete="off" required>
                            <label class="btn btn-outline-danger btn-lg text-start px-4" for="opcion_no">
                                <i class="fa-regular fa-circle text-muted me-2 radio-icon"></i>En Contra (No)
                            </label>
                            {% endfor %}
                            <input type="radio" class="btn-check" name="opcion" id="opcion_abs" value="abs" autocomplete="off" required>
                            <label class="btn btn-outline-secondary btn-lg text-start px-4" for="opcion_abs">
                                <i class="fa-regular fa-circle text-muted me-2 radio-icon"></i>Abstención
                            </label>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning btn-lg fw-bold text-dark shadow-sm">
                            <i class="fa-solid fa-paper-plane me-2"></i>Registrar Voto
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light border-0 text-center py-3">
                <a href="#" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-1"></i>Volver a la Asamblea</a>
            </div>
        </div>
    </div>
</div>

<style>
.btn-check:checked + .btn .radio-icon::before {
    content: "\f192"; /* fa-circle-dot */
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
}
.btn-check:checked + .btn-outline-primary .radio-icon { color: #0d6efd !important; }
.btn-check:checked + .btn-outline-success .radio-icon { color: #198754 !important; }
.btn-check:checked + .btn-outline-danger .radio-icon { color: #dc3545 !important; }
.btn-check:checked + .btn-outline-secondary .radio-icon { color: #6c757d !important; }
</style>
{% endblock %}
