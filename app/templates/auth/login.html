{% extends "base_login.html" %}
{% block title %}Iniciar Sesión - Mi Voto{% endblock %}

{% block content %}
<style>
    /* ================================================================
       FONDO VERDE OSCURO DEGRADADO - OCUPA TODO EL VIEWPORT
       ================================================================ */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f2a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow-x: hidden;
    }

    .auth-page {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px;
    }

    /* Capa de textura */
    .auth-page::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 20% 30%, rgba(46, 204, 113, 0.06) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 70%, rgba(46, 204, 113, 0.04) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    /* Líneas geométricas */
    .auth-page::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
            linear-gradient(0deg, transparent 49.8%, rgba(255, 255, 255, 0.008) 49.8%, rgba(255, 255, 255, 0.008) 50.2%, transparent 50.2%),
            linear-gradient(90deg, transparent 49.8%, rgba(255, 255, 255, 0.008) 49.8%, rgba(255, 255, 255, 0.008) 50.2%, transparent 50.2%);
        background-size: 70px 70px;
        pointer-events: none;
        z-index: 0;
    }

    /* Partículas */
    .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(46, 204, 113, 0.15);
        pointer-events: none;
        z-index: 0;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(100vh) scale(0);
            opacity: 0;
        }

        10% {
            opacity: 0.5;
        }

        90% {
            opacity: 0.2;
        }

        100% {
            transform: translateY(-10vh) scale(1);
            opacity: 0;
        }
    }

    /* ================================================================
       TARJETA DE LOGIN - ESTILO UIVERSE
       ================================================================ */
    .form-card1 {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 460px;
        background-image: linear-gradient(163deg, #2ecc71 0%, #27ae60 100%);
        border-radius: 22px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-card1:hover {
        box-shadow: 0px 0px 40px 2px rgba(46, 204, 113, 0.35);
    }

    .form-card2 {
        border-radius: 20px;
        background: #0a0a0a;
        transition: all 0.3s ease;
        padding: 4px;
    }

    .form-card2:hover {
        transform: scale(0.98);
        border-radius: 22px;
    }

    /* ================================================================
       ENCABEZADO CON LOGO RECTANGULAR GRANDE
       ================================================================ */
    .login-header {
        text-align: center;
        padding: 28px 30px 0;
    }

    /* CONTENEDOR DEL LOGO - RECTANGULAR */
    .logo-container {
        width: 100%;
        max-width: 320px;
        height: 100px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        overflow: hidden;
        background: transparent;
        transition: transform 0.3s ease, filter 0.3s ease;
    }

    .logo-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 10px 20px rgba(46, 204, 113, 0.4));
    }

    /* IMAGEN DEL LOGO */
    .logo-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
    }

    /* FALLBACK SI NO HAY IMAGEN */
    .logo-fallback {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: linear-gradient(135deg, rgba(46, 204, 113, 0.15), rgba(39, 174, 96, 0.1));
        border-radius: 16px;
        border: 2px dashed rgba(46, 204, 113, 0.3);
    }

    .logo-fallback i {
        font-size: 42px;
        color: #2ecc71;
    }

    .logo-fallback span {
        font-size: 14px;
        font-weight: 700;
        color: #2ecc71;
        letter-spacing: 1px;
    }

    /* TEXTO BAJO EL LOGO */
    .login-header h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.4px;
        color: #f0f0f0;
        margin-bottom: 6px;
    }

    .login-header h1 span {
        color: #2ecc71;
    }

    .login-header p {
        color: #888;
        font-size: 12.5px;
        font-weight: 500;
        margin-bottom: 6px;
    }

    /* ================================================================
       FORMULARIO
       ================================================================ */
    .form {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px 28px 28px;
        background-color: #0a0a0a;
        border-radius: 0 0 20px 20px;
    }

    .form-heading {
        text-align: center;
        margin-bottom: 4px;
        color: #2ecc71;
        font-size: 1.1em;
        font-weight: 700;
    }

    .form-field {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 12px;
        padding: 4px;
        background-color: #171717;
        box-shadow: inset 2px 4px 8px rgba(0, 0, 0, 0.6);
        transition: all 0.3s ease;
    }

    .form-field:focus-within {
        box-shadow: inset 2px 4px 8px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(46, 204, 113, 0.4);
    }

    .form-field i {
        color: #666;
        font-size: 15px;
        padding-left: 12px;
        transition: color 0.3s;
    }

    .form-field:focus-within i {
        color: #2ecc71;
    }

    .input-field {
        background: none;
        border: none;
        outline: none;
        width: 100%;
        color: #ccd6f6;
        padding: 12px 12px 12px 0;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
    }

    .input-field::placeholder {
        color: #555;
    }

    .toggle-pass {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        padding: 8px 14px 8px 8px;
        font-size: 15px;
        transition: color 0.2s;
    }

    .toggle-pass:hover {
        color: #2ecc71;
    }

    /* Botón */
    .sendMessage-btn {
        cursor: pointer;
        margin-top: 8px;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background-color: transparent;
        color: #2ecc71;
        font-weight: 700;
        font-size: 15px;
        outline: 1.5px solid #2ecc71;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: 'Inter', sans-serif;
    }

    .sendMessage-btn:hover {
        background-color: #2ecc71;
        color: #000;
        box-shadow: 0 0 25px rgba(46, 204, 113, 0.4);
    }

    /* Botón éxito dorado */
    .sendMessage-btn.success {
        color: #D4A017 !important;
        outline: 2px solid #D4A017 !important;
        animation: goldenPulse 1.5s ease-in-out infinite;
        pointer-events: none;
    }

    .sendMessage-btn.success:hover {
        background-color: transparent !important;
        color: #D4A017 !important;
        box-shadow: 0 0 30px rgba(212, 160, 23, 0.5);
    }

    @keyframes goldenPulse {

        0%,
        100% {
            box-shadow: 0 0 10px rgba(212, 160, 23, 0.3);
        }

        50% {
            box-shadow: 0 0 30px rgba(212, 160, 23, 0.6), 0 0 60px rgba(255, 215, 0, 0.3);
        }
    }

    .btn-icon {
        animation: iconPopIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
    }

    @keyframes iconPopIn {
        0% {
            transform: scale(0) rotate(-180deg);
            opacity: 0;
        }

        100% {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }
    }

    /* Loader */
    .btn-loader {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(46, 204, 113, 0.3);
        border-radius: 50%;
        border-top-color: #2ecc71;
        animation: spin 0.7s linear infinite;
    }

    .sendMessage-btn.loading .btn-loader {
        display: inline-block;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Footer */
    .login-footer {
        text-align: center;
        padding: 20px 28px 28px;
        background-color: #0a0a0a;
        border-radius: 0 0 20px 20px;
    }

    .login-footer a {
        color: #666;
        font-size: 12.5px;
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s;
    }

    .login-footer a:hover {
        color: #2ecc71;
    }

    /* Marca de agua */
    .watermark {
        position: fixed;
        bottom: 24px;
        right: 28px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.12);
        font-weight: 600;
        letter-spacing: 1.2px;
        z-index: 0;
        pointer-events: none;
    }

    /* Alertas */
    .flash-alert {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 18px 20px 0;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        animation: shakeAlert 0.5s ease;
    }

    .flash-danger {
        background: rgba(220, 38, 38, 0.15);
        color: #f87171;
        border: 1px solid rgba(220, 38, 38, 0.3);
    }

    @keyframes shakeAlert {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-5px);
        }

        50% {
            transform: translateX(5px);
        }

        75% {
            transform: translateX(-3px);
        }
    }

    /* Responsive */
    @media (max-width: 480px) {
        .form-card1 {
            max-width: 100%;
            border-radius: 18px;
        }

        .form {
            padding: 16px 18px 22px;
        }

        .login-header {
            padding: 22px 20px 0;
        }

        .login-header h1 {
            font-size: 21px;
        }

        .logo-container {
            max-width: 260px;
            height: 80px;
        }

        .logo-fallback i {
            font-size: 34px;
        }
    }
</style>

<div class="auth-page">

    <div class="form-card1">
        <div class="form-card2">

            <!-- Encabezado con logo rectangular -->
            <div class="login-header">
                <!-- LOGO RECTANGULAR GRANDE -->
                <div class="logo-container">
                    <img src="" alt="Mi Voto" class="logo-img" id="logoImage"
                        onerror="this.style.display='none'; document.getElementById('fallbackIcon').style.display='flex';">
                    <div class="logo-fallback" id="fallbackIcon" style="display: none;">
                        <i class="fa-solid fa-vote-yea"></i>
                        <span></span>
                    </div>
                </div>

                <h1>Mi <span>Voto</span></h1>

            </div>

            <!-- Formulario -->
            <form class="form" id="loginForm" method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <p class="form-heading">Acceso al Sistema</p>

                <div class="form-field">
                    <i class="fa-solid fa-user"></i>
                    <input required placeholder="Usuario" class="input-field" type="text" id="username" name="username"
                        autofocus />
                </div>

                <div class="form-field">
                    <i class="fa-solid fa-lock"></i>
                    <input required placeholder="Contraseña" class="input-field" type="password" id="password"
                        name="password" />
                    <button type="button" class="toggle-pass" id="togglePassword" tabindex="-1">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <button class="sendMessage-btn" type="submit" id="loginButton">
                    <span id="btnText">Ingresar</span>
                    <span id="btnLoader" class="btn-loader"></span>
                    <span id="btnIcon" class="btn-icon" style="display: none;">
                        <i class="fa-solid fa-circle-check"></i>
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <a href="{{ url_for('auth.olvide_contrasena') }}"><i class="fa-solid fa-circle-question"></i> ¿Olvidaste tu contraseña?</a>
            </div>

        </div>
    </div>

    <div class="watermark">Mi Voto &copy; 2026</div>

</div>

<script>
    // ============================================================
    // 1. DETECCIÓN AUTOMÁTICA DE LOGO
    // ============================================================
    const logoImage = document.getElementById('logoImage');
    const fallbackIcon = document.getElementById('fallbackIcon');
    const extensions = ['png', 'jpg', 'jpeg', 'svg', 'webp'];
    let foundLogo = false;

    function tryLoadLogo(index) {
        if (index >= extensions.length || foundLogo) return;
        const testImg = new Image();
        testImg.onload = function () {
            if (!foundLogo) {
                foundLogo = true;
                logoImage.src = '/static/img/logo.mivoto.' + extensions[index];
                logoImage.style.display = 'block';
                fallbackIcon.style.display = 'none';
            }
        };
        testImg.onerror = function () { tryLoadLogo(index + 1); };
        testImg.src = '/static/img/logo.mivoto.' + extensions[index];
    }
    tryLoadLogo(0);
    setTimeout(() => {
        if (!foundLogo) {
            logoImage.style.display = 'none';
            fallbackIcon.style.display = 'flex';
        }
    }, 2000);

    // ============================================================
    // 2. TOGGLE CONTRASEÑA
    // ============================================================
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'fa-regular fa-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'fa-regular fa-eye';
        }
    });

    // ============================================================
    // 3. PARTÍCULAS
    // ============================================================
    const container = document.querySelector('.auth-page');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random() * 4 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 15) + 's';
        p.style.animationDelay = Math.random() * 12 + 's';
        container.appendChild(p);
    }

    // ============================================================
    // 4. LOGIN CON EFECTO DORADO
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const btn = document.getElementById('loginButton');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const btnIcon = document.getElementById('btnIcon');

        btn.classList.add('loading');
        btn.classList.remove('success');
        btnText.textContent = 'Verificando...';
        btnLoader.style.display = 'inline-block';
        btnIcon.style.display = 'none';
        btn.disabled = true;

        try {
            const formData = new FormData(this);
            const response = await fetch('{{ url_for("auth.login") }}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': document.querySelector('input[name="csrf_token"]').value
                }
            });

            if (response.redirected) {
                btn.classList.remove('loading');
                btn.classList.add('success');
                btnLoader.style.display = 'none';
                btnText.textContent = 'Acceso Concedido';
                btnIcon.style.display = 'inline-block';

                setTimeout(() => {
                    window.location.href = response.url;
                }, 1500);
            } else {
                throw new Error('Credenciales incorrectas');
            }
        } catch (error) {
            btn.classList.remove('loading', 'success');
            btnLoader.style.display = 'none';
            btnText.textContent = 'Ingresar';
            btnIcon.style.display = 'none';
            btn.disabled = false;
            document.getElementById('password').value = '';
            alert('Usuario o contraseña incorrectos');
        }
    });
</script>
{% endblock %}
