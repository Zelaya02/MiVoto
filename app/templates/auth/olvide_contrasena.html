{% extends "base_login.html" %}
{% block title %}Recuperar Contraseña - Mi Voto{% endblock %}

{% block content %}
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f2a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow-x: hidden;
    }

    .auth-page {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px;
    }

    .auth-page::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 20% 30%, rgba(46, 204, 113, 0.06) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 70%, rgba(46, 204, 113, 0.04) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    .form-card1 {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 460px;
        background-image: linear-gradient(163deg, #2ecc71 0%, #27ae60 100%);
        border-radius: 22px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(50px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-card2 {
        border-radius: 20px;
        background: #0a0a0a;
        transition: all 0.3s ease;
        padding: 4px;
    }

    .form-card2:hover {
        transform: scale(0.98);
        border-radius: 22px;
    }

    .login-header {
        text-align: center;
        padding: 28px 30px 0;
    }

    .login-header h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.4px;
        color: #f0f0f0;
        margin-bottom: 6px;
    }

    .login-header h1 span { color: #2ecc71; }

    .login-header p {
        color: #888;
        font-size: 12.5px;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .form {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px 28px 28px;
        background-color: #0a0a0a;
        border-radius: 0 0 20px 20px;
    }

    .form-heading {
        text-align: center;
        margin-bottom: 4px;
        color: #2ecc71;
        font-size: 1.1em;
        font-weight: 700;
    }

    .form-field {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 12px;
        padding: 4px;
        background-color: #171717;
        box-shadow: inset 2px 4px 8px rgba(0, 0, 0, 0.6);
        transition: all 0.3s ease;
    }

    .form-field:focus-within {
        box-shadow: inset 2px 4px 8px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(46, 204, 113, 0.4);
    }

    .form-field i {
        color: #666;
        font-size: 15px;
        padding-left: 12px;
        transition: color 0.3s;
    }

    .form-field:focus-within i { color: #2ecc71; }

    .input-field {
        background: none;
        border: none;
        outline: none;
        width: 100%;
        color: #ccd6f6;
        padding: 12px 12px 12px 0;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
    }

    .input-field::placeholder { color: #555; }

    .sendMessage-btn {
        cursor: pointer;
        margin-top: 8px;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background-color: transparent;
        color: #2ecc71;
        font-weight: 700;
        font-size: 15px;
        outline: 1.5px solid #2ecc71;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: 'Inter', sans-serif;
    }

    .sendMessage-btn:hover {
        background-color: #2ecc71;
        color: #000;
        box-shadow: 0 0 25px rgba(46, 204, 113, 0.4);
    }

    .login-footer {
        text-align: center;
        padding: 20px 28px 28px;
        background-color: #0a0a0a;
        border-radius: 0 0 20px 20px;
    }

    .login-footer a {
        color: #2ecc71;
        font-size: 12.5px;
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s;
    }

    .login-footer a:hover { color: #fff; }

    .watermark {
        position: fixed;
        bottom: 24px;
        right: 28px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.12);
        font-weight: 600;
        letter-spacing: 1.2px;
        z-index: 0;
        pointer-events: none;
    }

    @media (max-width: 480px) {
        .form-card1 { max-width: 100%; border-radius: 18px; }
        .form { padding: 16px 18px 22px; }
        .login-header { padding: 22px 20px 0; }
        .login-header h1 { font-size: 21px; }
    }
</style>

<div class="auth-page">
    <div class="form-card1">
        <div class="form-card2">
            <div class="login-header">
                <h1>Recuperar <span>Contraseña</span></h1>
                <p>Ingresa tu correo electrónico y te enviaremos una nueva contraseña.</p>
            </div>

            <form class="form" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <p class="form-heading">Verificar Identidad</p>

                <div class="form-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input required placeholder="Correo electrónico" class="input-field" type="email" id="email" name="email" autofocus />
                </div>

                <button class="sendMessage-btn" type="submit">
                    <i class="fa-solid fa-paper-plane"></i> Enviar nueva contraseña
                </button>
            </form>

            <div class="login-footer">
                <a href="{{ url_for('auth.login') }}"><i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <div class="watermark">Mi Voto &copy; 2026</div>
</div>
{% endblock %}
